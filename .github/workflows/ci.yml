name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
        env:
          # Build does not connect to the database — all routes are dynamic
          # and data is fetched at request time, not build time. A syntactically
          # valid placeholder is sufficient to satisfy the postgres.js client
          # initialisation. The real DATABASE_URL is only needed at runtime (Vercel).
          DATABASE_URL: postgresql://placeholder:placeholder@localhost/placeholder
          NEXTAUTH_SECRET: placeholder
          NEXTAUTH_URL: http://localhost:3000
          ADMIN_EMAIL: placeholder@placeholder.com
          ADMIN_PASSWORD_HASH: placeholder
